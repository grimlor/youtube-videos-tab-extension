name: Sync Universal Skills

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout universal-dev-skills
        uses: actions/checkout@v4
        with:
          repository: grimlor/universal-dev-skills
          path: _universal-dev-skills

      - name: Sync universal skills
        run: |
          mkdir -p .github/skills
          for skill in _universal-dev-skills/skills/*/; do
            skill_name=$(basename "$skill")
            cp -r "$skill" .github/skills/
          done
          rm -rf _universal-dev-skills

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/skills/
          if git diff --cached --quiet; then
            echo "No changes to universal skills"
          else
            git commit -m "chore: sync universal dev skills"
            git push
          fi
